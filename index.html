<!DOCTYPE html>
<html lang="en">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<link rel="icon" type="image/png" href="/assets/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#9D19DD" />
		<link rel="apple-touch-icon" type="image/png" href="/assets/logo192.png" />
		<link rel="manifest" type="application/json" href="/manifest.json" />
		<title>Stumble</title>
		<style>
			html {
				margin: 0;
				background: #000000;
			}

			body {
				margin: 0;
			}

			noscript {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 2em;
				text-align: center;

				width: 120px;

				margin-bottom: 1.5em;
			}

			noscript p {
				font-size: 1.1em;
				line-height: 1.8;
				margin: 0;
				opacity: 0.85;

	<body>

		<noscript>
			<img src="/assets/logo512.png" alt="Stumble" />
			<p>Looks like you're in a bit of a Jam.<br />

		</noscript>

		<div id="root"></div>
