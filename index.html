<!DOCTYPE html>
<html lang="en">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<link rel="icon" type="image/png" href="/assets/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#9D19DD" />
		<link rel="apple-touch-icon" type="image/png" href="/assets/logo192.png" />
		<link rel="manifest" type="application/json" href="/manifest.json" />
		<title>Stumble</title>
		<style>
			* {
				padding: 0;
				margin: 0;
			}

			html {
				height: 100%;
				font-family: "Roboto", sans-serif;
				background: #000000;
				background-image:
					radial-gradient(circle at 25% 30%, rgba(157, 25, 221, 0.12) 0%, transparent 40%),
					radial-gradient(circle at 75% 70%, rgba(107, 15, 157, 0.1) 0%, transparent 40%),
					repeating-linear-gradient(60deg,
						transparent, transparent 14px,
						rgba(157, 25, 221, 0.06) 14px, rgba(157, 25, 221, 0.06) 15px),
					repeating-linear-gradient(-60deg,
						transparent, transparent 14px,
						rgba(107, 15, 157, 0.06) 14px, rgba(107, 15, 157, 0.06) 15px);
			}

			noscript {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 2em;
				text-align: center;
				font-family: sans-serif;
				color: #FFFFFF;
			}

			noscript img {
				width: 120px;
				height: 120px;
				margin-bottom: 2em;
			}

			noscript p {
				font-size: 1.1em;
				line-height: 1.4;
				margin: 0;
				opacity: 0.85;
			}

			#root {
				display: flex;
				flex-direction: column;
				min-height: 100vh;
			}
		</style>
	</head>
	<body>

		<noscript>
			<img src="/assets/logo.svg" alt="Stumble" />
			<p>Looks like you're in a bit of a Jam.<br />
			Let us help you find the Sauce of the problem.<br />
			Have you honestly never tried spreading JavaScript on Toast?<br />
			Maybe a bit of Jam or Marmalade too.</p>
		</noscript>

		<div id="root"></div>
		<script type="module" src="/src/index.tsx"></script>
	</body>
</html>
